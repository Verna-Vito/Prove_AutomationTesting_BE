# ══════════════════════════════════════════════════════════════
# PIPELINE DI TEST BACKEND — GitHub Actions
# ══════════════════════════════════════════════════════════════
#
# Trigger:
#   - Automatico: ad ogni push/merge su branch "master"
#   - Schedulato: ogni notte alle 23:27 ora italiana
#   - Manuale: workflow_dispatch
#
# Logica history:
#   - Allure 3 con history.jsonl
#   - Recuperata direttamente da GitHub Pages (no artifact)
#   - Se non trovata (prima run), parte da zero senza errori
#
# Report:
#   - Pubblicato su GitHub Pages (URL fisso, sempre aggiornato)
#   - Nessun artifact salvato su GitHub Actions
#
# Note importanti:
#   - Viene creato il file .nojekyll su gh-pages
#   - Serve per pubblicare anche cartelle/file che iniziano con "."
#   - Necessario per rendere accessibile /.allure/history.jsonl
# ══════════════════════════════════════════════════════════════

name: BE API Tests (NUnit) + Allure 3 Report + GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  schedule:
    - cron: '20 23 * * *'
      timezone: 'Europe/Rome'
    - cron: '25 23 * * *' 
      timezone: 'Europe/Rome'

permissions:
  actions: read
  contents: write
  pages: write

jobs:
  test-and-allure:
    runs-on: windows-latest

    steps:
      # ── Checkout repository ─────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Setup toolchain ─────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node (Allure CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java (safe for Allure tooling)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Allure CLI (npm)
        shell: pwsh
        run: |
          npm i -g allure
          allure --version

      # ── Individua .sln o .csproj ────────────────
      - name: Locate solution or project
        id: locate
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $sln = Get-ChildItem -Path . -Recurse -File -Filter *.sln | Select-Object -First 1
          if ($sln) {
            "target=$($sln.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Using solution: $($sln.FullName)"
            exit 0
          }

          $csproj = Get-ChildItem -Path . -Recurse -File -Filter *.csproj | Select-Object -First 1
          if ($csproj) {
            "target=$($csproj.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Using project: $($csproj.FullName)"
            exit 0
          }

          throw "Nessun file .sln o .csproj trovato nel repository."

      # ── Build ───────────────────────────────────
      - name: Restore
        shell: pwsh
        run: dotnet restore "${{ steps.locate.outputs.target }}"

      - name: Build
        shell: pwsh
        run: dotnet build "${{ steps.locate.outputs.target }}" --configuration Release --no-restore

      # ── Test ────────────────────────────────────
      - name: Test (TRX + Allure Results)
        shell: pwsh
        continue-on-error: true
        run: >
          dotnet test "${{ steps.locate.outputs.target }}" --configuration Release --no-build
          --logger "trx;LogFileName=test_results.trx"
          --results-directory ./TestResults

      # ── Configura Allure 3 (historyPath) ───────
      - name: Prepare Allure 3 CLI config (historyPath)
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force -Path ".\.allure" | Out-Null

          $cfgObj = @{
            historyPath = "./.allure/history.jsonl"
          }

          $json = $cfgObj | ConvertTo-Json -Depth 5
          Set-Content -Path ".\allure-report.config.json" -Value $json -Encoding utf8

          Write-Host "Configurazione Allure 3 creata:"
          Get-Content ".\allure-report.config.json"

      # ── Recupera history.jsonl da GitHub Pages ──
      - name: Restore Allure history.jsonl from GitHub Pages
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $ErrorActionPreference = "Continue"

          New-Item -ItemType Directory -Force -Path ".\.allure" | Out-Null

          $url = "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/.allure/history.jsonl"
          $dest = ".\.allure\history.jsonl"

          Write-Host "Recupero history.jsonl da: $url"

          try {
            $resp = Invoke-WebRequest -Uri $url -OutFile $dest -PassThru -ErrorAction Stop
            Write-Host "HTTP status: $($resp.StatusCode)"
            Write-Host "✅ history.jsonl recuperata da GitHub Pages"
          }
          catch {
            Write-Host "⚠️ Nessuna history trovata su GitHub Pages oppure file non accessibile."
            Write-Host "Dettaglio errore: $($_.Exception.Message)"
            New-Item -ItemType File -Force -Path $dest | Out-Null
            Write-Host "Si parte da history vuota."
          }

      # ── Genera report Allure 3 ──────────────────
      - name: Generate Allure Report (Allure 3 + historyPath)
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $ErrorActionPreference = "Stop"

          $resultsDirs = Get-ChildItem -Path . -Recurse -Directory -Filter "allure-results" |
                         Where-Object {
                           (Get-ChildItem $_.FullName -File -ErrorAction SilentlyContinue | Measure-Object).Count -gt 0
                         } |
                         Select-Object -ExpandProperty FullName

          if (-not $resultsDirs -or $resultsDirs.Count -eq 0) {
            Write-Host "❌ Nessuna cartella allure-results con contenuto trovata. Report non generato."
            exit 1
          }

          Write-Host "Cartelle allure-results trovate:"
          $resultsDirs | ForEach-Object { Write-Host " - $_" }

          if (Test-Path ".\allure-report") {
            Remove-Item -Recurse -Force ".\allure-report"
          }

          allure generate $resultsDirs --config ".\allure-report.config.json" -o ".\allure-report"

      # ── Ensure history file exists ──────────────
      - name: Ensure history.jsonl exists
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force -Path ".\.allure" | Out-Null
          $hist = ".\.allure\history.jsonl"

          if (-not (Test-Path $hist)) {
            New-Item -ItemType File -Force -Path $hist | Out-Null
          }

          Write-Host "✅ history.jsonl presente in: $hist"

      # ── Copia history.jsonl nel report ──────────
      - name: Include history.jsonl in report for GitHub Pages
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force -Path ".\allure-report\.allure" | Out-Null
          Copy-Item -Force ".\.allure\history.jsonl" ".\allure-report\.allure\history.jsonl"

          Write-Host "✅ history.jsonl inclusa nel report"

      # ── Deploy su GitHub Pages ──────────────────
      - name: Deploy report to GitHub Pages
        if: ${{ !cancelled() }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"

          $repo   = "${{ github.repository }}"
          $branch = "gh-pages"
          $remote = "https://x-access-token:$env:GH_TOKEN@github.com/$repo.git"

          Write-Host "Repository: $repo"
          Write-Host "Branch deploy: $branch"

          $branchExists = git ls-remote --heads $remote $branch

          New-Item -ItemType Directory -Force -Path "gh-pages-deploy" | Out-Null
          Set-Location "gh-pages-deploy"

          git init
          git remote add origin $remote

          if ($branchExists) {
            Write-Host "Branch $branch trovato, scarico il contenuto attuale..."
            git fetch origin $branch --depth=1
            git checkout -b $branch "origin/$branch"

            Get-ChildItem -Force |
              Where-Object { $_.Name -ne ".git" } |
              Remove-Item -Recurse -Force
          }
          else {
            Write-Host "Branch $branch non trovato, lo creo come orfano..."
            git checkout --orphan $branch
          }

          Write-Host "Copio il report generato..."
          Get-ChildItem "..\allure-report" -Force | Copy-Item -Destination "." -Recurse -Force

          Write-Host "Creo .nojekyll per consentire la pubblicazione di .allure/ ..."
          New-Item -ItemType File -Force -Path ".nojekyll" | Out-Null

          Write-Host "Contenuto root pronto per il deploy:"
          Get-ChildItem -Force

          git add -A

          $changes = git status --porcelain
          if ($changes) {
            git commit -m "Report Allure — Run ${{ github.run_number }} — ${{ github.event_name }}"
            git push $remote $branch --force

            Write-Host ""
            Write-Host "✅ Report pubblicato su:"
            Write-Host "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
            Write-Host ""
            Write-Host "✅ History attesa su:"
            Write-Host "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/.allure/history.jsonl"
          }
          else {
            Write-Host "Nessuna modifica da pubblicare."
          }
