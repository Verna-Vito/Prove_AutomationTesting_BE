# ══════════════════════════════════════════════════════════════
# PIPELINE DI TEST BACKEND — GitHub Actions
# ══════════════════════════════════════════════════════════════
#
# Trigger:
#   - Automatico: ad ogni push/merge su branch "main"
#   - Schedulato: ogni notte alle 2:00
#   - Manuale: workflow_dispatch
#
# Logica history:
#   - Allure 3 con history.jsonl
#   - Cerca la history nelle ultime 30 run (qualsiasi stato), andando a ritroso
#   - Se non trovata, parte da zero senza errori
#
# Report:
#   - Pubblicato su GitHub Pages (URL fisso, sempre aggiornato)
#   - Artifact di backup: TRX, allure-results, allure-report, history.jsonl
# ══════════════════════════════════════════════════════════════

name: BE API Tests (NUnit) + Allure 3 Report + GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '15 23 * * *'    # ogni notte alle 2:00

permissions:
  actions: read
  contents: write      # necessario per push su gh-pages
  pages: write         # necessario per GitHub Pages

jobs:
  test-and-allure:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node (Allure CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java (safe for Allure tooling)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Allure CLI (npm)
        run: |
          npm i -g allure
          allure --version

      # ── Individua .sln o .csproj ─────────────
      - name: Locate solution or project
        id: locate
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $sln = Get-ChildItem -Path . -Recurse -File -Filter *.sln | Select-Object -First 1
          if ($sln) {
            "target=$($sln.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Using solution: $($sln.FullName)"
            exit 0
          }

          $csproj = Get-ChildItem -Path . -Recurse -File -Filter *.csproj | Select-Object -First 1
          if ($csproj) {
            "target=$($csproj.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Using project: $($csproj.FullName)"
            exit 0
          }

          throw "Nessun file .sln o .csproj trovato nel repository."

      # ── Build ────────────────────────────────
      - name: Restore
        run: dotnet restore "${{ steps.locate.outputs.target }}"

      - name: Build
        run: dotnet build "${{ steps.locate.outputs.target }}" --configuration Release --no-restore

      # ── Test ─────────────────────────────────
      - name: Test (TRX + Allure Results)
        continue-on-error: true
        run: >
          dotnet test "${{ steps.locate.outputs.target }}" --configuration Release --no-build
          --logger "trx;LogFileName=test_results.trx"
          --results-directory ./TestResults

      # ── Configura Allure 3 (historyPath) ─────
      - name: Prepare Allure 3 CLI config (historyPath)
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path ".\.allure" | Out-Null

          $cfgObj = @{ historyPath = "./.allure/history.jsonl" }
          $json = $cfgObj | ConvertTo-Json -Depth 5
          Set-Content -Path ".\allure-report.config.json" -Value $json -Encoding utf8

      # ── Recupera history.jsonl dalle run precedenti ──
      - name: Restore Allure history.jsonl from previous runs (search back)
        shell: pwsh
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Continue"
          New-Item -ItemType Directory -Force -Path ".\.allure" | Out-Null

          $wf = "${{ github.workflow }}"
          $branch = "${{ github.ref_name }}"
          $currentRunId = "${{ github.run_id }}"

          Write-Host "Searching previous runs for artifact 'allure-history-file' (any status)..."

          $runIds = gh run list --workflow "$wf" --branch "$branch" --limit 30 --json databaseId -q ".[] | .databaseId"

          foreach ($rid in $runIds) {
            if ("$rid" -eq $currentRunId) { continue }

            Remove-Item -Recurse -Force ".\_prev" -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Force -Path ".\_prev" | Out-Null

            gh run download $rid -n "allure-history-file" -D ".\_prev" 2>$null | Out-Null

            if (Test-Path ".\_prev\history.jsonl") {
              Copy-Item -Force ".\_prev\history.jsonl" ".\.allure\history.jsonl"
              Write-Host "✅ Restored history.jsonl from runId=$rid"
              exit 0
            }
          }

          Write-Host "No history.jsonl found in last 30 runs. Starting fresh."

      # ── Genera report Allure 3 ────────────────
      - name: Generate Allure Report (Allure 3 + historyPath)
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $ErrorActionPreference = "Stop"

          $resultsDirs = Get-ChildItem -Path . -Recurse -Directory -Filter "allure-results" |
                         Where-Object { (Get-ChildItem $_.FullName -File -ErrorAction SilentlyContinue | Measure-Object).Count -gt 0 } |
                         Select-Object -ExpandProperty FullName

          if (-not $resultsDirs -or $resultsDirs.Count -eq 0) {
            Write-Host "No allure-results with content found. Report will not be generated."
            exit 1
          }

          if (Test-Path ".\allure-report") { Remove-Item -Recurse -Force ".\allure-report" }

          allure generate $resultsDirs --config ".\allure-report.config.json" -o ".\allure-report"

      - name: Ensure history.jsonl exists
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path ".\.allure" | Out-Null
          $hist = ".\.allure\history.jsonl"
          if (-not (Test-Path $hist)) { New-Item -ItemType File -Force -Path $hist | Out-Null }

      # ── Artifact di backup ────────────────────
      - name: Upload TRX results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: testresults-trx
          path: ./TestResults/**/*.trx

      - name: Upload Allure Results (raw)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: |
            **/allure-results/**

      - name: Upload Allure Report (HTML)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./allure-report/**

      - name: Upload Allure history file (for next runs)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-history-file
          path: ./.allure/history.jsonl
          if-no-files-found: warn

      # ── Deploy su GitHub Pages ────────────────
      - name: Deploy report to GitHub Pages
        if: ${{ !cancelled() }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"

          $repo   = "${{ github.repository }}"
          $branch = "gh-pages"
          $remote = "https://x-access-token:$env:GH_TOKEN@github.com/$repo.git"

          Write-Host "Clono branch $branch..."

          try {
            git clone --branch $branch --single-branch $remote gh-pages-deploy 2>&1
          }
          catch {
            git clone $remote gh-pages-deploy
          }

          Set-Location gh-pages-deploy

          # Crea branch orfano se non esiste
          $branchExists = git branch -r | Select-String "origin/$branch"
          if (-not $branchExists) {
            Write-Host "Branch $branch non trovato, lo creo come orfano..."
            git checkout --orphan $branch
            git rm -rf . | Out-Null
          }
          else {
            git checkout $branch
            Get-ChildItem -Force | Where-Object { $_.Name -ne ".git" } | Remove-Item -Recurse -Force
          }

          # Copia il report generato
          Copy-Item -Recurse -Force "..\allure-report\*" "."

          # Commit e push
          git add -A
          $changes = git status --porcelain
          if ($changes) {
            git commit -m "Report Allure — Run ${{ github.run_number }} — ${{ github.event_name }}"
            git push $remote $branch --force
            Write-Host ""
            Write-Host "✅ Report pubblicato su: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          }
          else {
            Write-Host "Nessuna modifica da pubblicare."
          }
