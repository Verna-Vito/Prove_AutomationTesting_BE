name: BE API Tests (NUnit) + Allure 3 Reports + GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [ "master", "develop" ]
  schedule:
    - cron: '0 07 * * *'
      timezone: 'Europe/Rome'
    - cron: '0 15 * * *'
      timezone: 'Europe/Rome'
    - cron: '0 23 * * *'
      timezone: 'Europe/Rome'

permissions:
  actions: read
  contents: write
  pages: write

jobs:
  validation:
    uses: ./.github/workflows/run-allure-suite.yml
    with:
      suite_name: "Validation"
      report_subpath: "validation"
      report_title: "BE API Tests - Validation"
      nunit_where: "cat == 'Validation Test'"

  non-regression:
    uses: ./.github/workflows/run-allure-suite.yml
    with:
      suite_name: "Non Regression"
      report_subpath: "non-regression"
      report_title: "BE API Tests - Non Regression"
      nunit_where: ""

  integration:
    uses: ./.github/workflows/run-allure-suite.yml
    with:
      suite_name: "Integration"
      report_subpath: "integration"
      report_title: "BE API Tests - Integration"
      nunit_where: "cat == 'Integration Test'"

  deploy-pages:
    name: Deploy Pages
    runs-on: windows-latest
    needs:
      - validation
      - non-regression
      - integration
    if: ${{ always() && !cancelled() }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Validation report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-report-validation
          path: allure-report-validation

      - name: Download Non Regression report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-report-non-regression
          path: allure-report-non-regression

      - name: Download Integration report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-report-integration
          path: allure-report-integration

      - name: Download Validation metadata
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-meta-validation
          path: meta-validation

      - name: Download Non Regression metadata
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-meta-non-regression
          path: meta-non-regression

      - name: Download Integration metadata
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-meta-integration
          path: meta-integration

      - name: Create Pages landing page
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $romeTzId = "W. Europe Standard Time"
          $romeNow = [System.TimeZoneInfo]::ConvertTimeBySystemTimeZoneId((Get-Date), $romeTzId)
          $runDate = $romeNow.ToString("dd/MM/yyyy HH:mm")

          switch ("${{ github.event_name }}") {
            "schedule" { $runType = "Scheduled" }
            "workflow_dispatch" { $runType = "Manual" }
            "push" { $runType = "Push" }
            default { $runType = "${{ github.event_name }}" }
          }

          $triggeredSchedule = "${{ github.event.schedule }}"
          if ([string]::IsNullOrWhiteSpace($triggeredSchedule)) {
            $triggeredScheduleLabel = "N/A"
          }
          else {
            $triggeredScheduleLabel = $triggeredSchedule
          }

          $scheduleDefinitions = @(
            @{ cron = "0 07 * * *"; label = "07:00"; timezone = "Europe/Rome" },
            @{ cron = "0 15 * * *"; label = "15:00"; timezone = "Europe/Rome" },
            @{ cron = "0 23 * * *"; label = "23:00"; timezone = "Europe/Rome" }
          )

          function Get-NextDailyOccurrence {
            param(
              [Parameter(Mandatory = $true)][string]$Cron,
              [Parameter(Mandatory = $true)][datetime]$NowLocal
            )

            $parts = $Cron -split "\s+"
            if ($parts.Count -ne 5) {
              return $null
            }

            $minuteExpr = $parts[0]
            $hourExpr   = $parts[1]
            $dayExpr    = $parts[2]
            $monthExpr  = $parts[3]
            $dowExpr    = $parts[4]

            if ($dayExpr -ne "*" -or $monthExpr -ne "*" -or $dowExpr -ne "*") {
              return $null
            }

            if ($minuteExpr -notmatch '^\d{1,2}$' -or $hourExpr -notmatch '^\d{1,2}$') {
              return $null
            }

            $minute = [int]$minuteExpr
            $hour   = [int]$hourExpr

            if ($minute -lt 0 -or $minute -gt 59 -or $hour -lt 0 -or $hour -gt 23) {
              return $null
            }

            $candidate = Get-Date -Year $NowLocal.Year -Month $NowLocal.Month -Day $NowLocal.Day -Hour $hour -Minute $minute -Second 0

            if ($candidate -le $NowLocal) {
              $candidate = $candidate.AddDays(1)
            }

            return $candidate
          }

          $nextRuns = New-Object System.Collections.Generic.List[object]

          foreach ($schedule in $scheduleDefinitions) {
            $next = Get-NextDailyOccurrence -Cron $schedule.cron -NowLocal $romeNow
            if ($null -ne $next) {
              $displayValue = "{0} · {1}" -f $next.ToString("dd/MM/yyyy HH:mm"), $schedule.timezone

              $nextRuns.Add([PSCustomObject]@{
                Cron     = $schedule.cron
                Label    = $schedule.label
                Timezone = $schedule.timezone
                When     = $next
                Display  = $displayValue
              })
            }
          }

          $nextRuns =
            $nextRuns |
            Sort-Object When |
            Group-Object Display |
            ForEach-Object { $_.Group[0] }

          $nextRunsHtml = ""
          foreach ($run in $nextRuns) {
            $nextRunsHtml += "<span class='hero-schedule-pill' title='Cron: $($run.Cron)'>$($run.Display)</span>`n"
          }

          if ([string]::IsNullOrWhiteSpace($nextRunsHtml)) {
            $nextRunsHtml = "<span class='hero-schedule-pill hero-schedule-pill-muted'>No future scheduled run detected</span>"
          }

          $html = @"
          <!DOCTYPE html>
          <html lang="it">
          
          <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>BE API Test Reports</title>
              <style>
                  :root {
                      --bg: #2c343f;
                      --panel: #1b2129;
                      --panel-soft: #24303c;
                      --text: #f6fafe;
                      --muted: #94a3b8;
                      --glor: #4F19E1;
                      --a4f: #EF7F3F;
                      --border: rgba(189, 212, 255, 0.21);
                      --shadow: rgba(0, 0, 0, 0.22);
                  }
          
                  * {
                      box-sizing: border-box;
                  }
          
                  body {
                      margin: 0;
                      font-family: Arial, sans-serif;
                      color: var(--text);
                      background:
                          radial-gradient(circle at top right, rgba(79, 25, 225, 0.14), transparent 22%),
                          radial-gradient(circle at top left, rgba(239, 127, 63, 0.10), transparent 20%),
                          linear-gradient(180deg, #2c343f 0%, #26303a 100%);
                      min-height: 100vh;
                  }
          
                  .wrap {
                      max-width: 1100px;
                      margin: 0 auto;
                      padding: 32px 20px 40px;
                  }
          
                  .hero {
                      display: grid;
                      grid-template-columns: 1.45fr 1fr;
                      gap: 20px;
                      margin-bottom: 22px;
                  }
          
                  .hero-main,
                  .hero-side {
                      background: rgba(27, 33, 41, 0.9);
                      border: 1px solid var(--border);
                      border-radius: 18px;
                      box-shadow: 0 10px 28px var(--shadow);
                  }
          
                  .hero-main {
                      padding: 26px;
                      position: relative;
                      overflow: hidden;
                      display: flex;
                      flex-direction: column;
                      min-height: 100%;
                  }
          
                  .hero-main::before {
                      content: "";
                      position: absolute;
                      inset: 0;
                      background:
                          linear-gradient(135deg, rgba(79, 25, 225, 0.10), transparent 34%),
                          linear-gradient(315deg, rgba(239, 127, 63, 0.08), transparent 42%);
                      pointer-events: none;
                  }
          
                  .brand {
                      position: relative;
                      z-index: 1;
                      display: flex;
                      align-items: center;
                      justify-content: space-between;
                      gap: 18px;
                      margin-bottom: 18px;
                      width: 100%;
                  }
          
                  .brand-left,
                  .brand-right {
                      display: flex;
                      align-items: center;
                  }
          
                  .brand-logo {
                      display: block;
                      object-fit: contain;
                      border-radius: 14px;
                      overflow: hidden;
                      background: transparent;
                      padding: 0;
                      border: none;
                  }
          
                  .main-logo {
                      height: 46px;
                      width: auto;
                      max-width: 200px;
                  }
          
                  .secondary-logo {
                      height: 46px;
                      width: auto;
                      max-width: 200px;
                  }
          
                  .hero-tag {
                      display: inline-block;
                      margin-bottom: 14px;
                      padding: 6px 10px;
                      border-radius: 999px;
                      border: 1px solid rgba(79, 25, 225, 0.28);
                      background: rgba(79, 25, 225, 0.12);
                      color: #b8a2ff;
                      font-size: 0.78rem;
                      font-weight: 700;
                      text-transform: uppercase;
                      letter-spacing: 0.04em;
                      position: relative;
                      z-index: 1;
                      width: fit-content;
                  }
          
                  .hero-main h1 {
                      margin: 0 0 10px;
                      font-size: 1.9rem;
                      line-height: 1.1;
                      position: relative;
                      z-index: 1;
                  }
          
                  .hero-main p {
                      margin: 0 0 18px;
                      color: var(--muted);
                      line-height: 1.65;
                      position: relative;
                      z-index: 1;
                      max-width: 720px;
                  }
          
                  .hero-schedule-wrap {
                      position: relative;
                      z-index: 1;
                      display: flex;
                      flex-wrap: wrap;
                      gap: 10px;
                      margin-bottom: 18px;
                  }
          
                  .hero-schedule-pill {
                      display: inline-flex;
                      align-items: center;
                      gap: 8px;
                      padding: 8px 12px;
                      border-radius: 999px;
                      border: 1px solid rgba(79, 25, 225, 0.34);
                      background: rgba(79, 25, 225, 0.16);
                      color: #d2c4ff;
                      font-size: 0.82rem;
                      font-weight: 700;
                      letter-spacing: 0.01em;
                      white-space: nowrap;
                  }
          
                  .hero-schedule-pill-muted {
                      border-color: rgba(189, 212, 255, 0.16);
                      background: rgba(148, 163, 184, 0.08);
                      color: #c1cada;
                  }
          
                  .hero-note {
                      margin-top: auto;
                      padding-top: 18px;
                      text-align: right;
                      color: rgba(246, 250, 254, 0.68);
                      font-size: 0.78rem;
                      font-style: italic;
                      letter-spacing: 0.02em;
                      position: relative;
                      z-index: 1;
                  }
          
                  .hero-side {
                      padding: 18px;
                      display: grid;
                      gap: 12px;
                  }
          
                  .meta-card {
                      background: linear-gradient(180deg, rgba(36, 48, 60, 0.92), rgba(27, 33, 41, 0.9));
                      border: 1px solid var(--border);
                      border-radius: 14px;
                      padding: 16px;
                  }
          
                  .meta-card-title {
                      margin: 0 0 12px;
                      color: var(--text);
                      font-size: 0.96rem;
                      font-weight: 800;
                      letter-spacing: 0.01em;
                  }
          
                  .meta-row {
                      display: flex;
                      align-items: flex-start;
                      justify-content: space-between;
                      gap: 12px;
                      padding-bottom: 10px;
                      margin-bottom: 10px;
                      border-bottom: 1px solid rgba(189, 212, 255, 0.08);
                  }
          
                  .meta-row:last-child {
                      padding-bottom: 0;
                      margin-bottom: 0;
                      border-bottom: 0;
                  }
          
                  .meta-label {
                      color: var(--muted);
                      font-size: 0.76rem;
                      text-transform: uppercase;
                      letter-spacing: 0.08em;
                      flex: 0 0 auto;
                  }
          
                  .meta-value {
                      color: var(--text);
                      font-size: 0.94rem;
                      font-weight: 700;
                      text-align: right;
                      word-break: break-word;
                  }
          
                  .section-head {
                      margin: 0 0 18px;
                  }
          
                  .section-head h2 {
                      margin: 0 0 8px;
                      font-size: 1.28rem;
                      line-height: 1.2;
                      color: var(--text);
                      font-weight: 800;
                      letter-spacing: 0.01em;
                  }
          
                  .section-head p {
                      margin: 0;
                      color: #b4c0d0;
                      font-size: 0.96rem;
                      line-height: 1.5;
                  }
          
                  .grid {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                      gap: 18px;
                  }
          
                  .report-card {
                      display: flex;
                      flex-direction: column;
                      text-decoration: none;
                      color: inherit;
                      background: linear-gradient(180deg, rgba(27, 33, 41, 0.98), rgba(36, 48, 60, 0.92));
                      border: 1px solid var(--border);
                      border-radius: 18px;
                      padding: 22px;
                      min-height: 180px;
                      position: relative;
                      overflow: hidden;
                      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.16);
                      transition:
                          transform 0.22s ease,
                          box-shadow 0.22s ease,
                          border-color 0.22s ease;
                  }
          
                  .report-card::before {
                      content: "";
                      position: absolute;
                      inset: 0;
                      background:
                          linear-gradient(140deg, rgba(79, 25, 225, 0.08), transparent 36%),
                          linear-gradient(320deg, rgba(239, 127, 63, 0.05), transparent 42%);
                      pointer-events: none;
                  }
          
                  .report-card:hover {
                      transform: translateY(-5px);
                      border-color: rgba(143, 111, 255, 0.85);
                      box-shadow:
                          0 14px 28px rgba(0, 0, 0, 0.24),
                          0 0 0 1px rgba(79, 25, 225, 0.32);
                  }
          
                  .report-card:focus-visible {
                      outline: 2px solid var(--glor);
                      outline-offset: 4px;
                  }
          
                  .card-head,
                  .card-body,
                  .card-foot {
                      position: relative;
                      z-index: 1;
                  }
          
                  .card-head {
                      display: flex;
                      align-items: center;
                      justify-content: space-between;
                      gap: 12px;
                      margin-bottom: 18px;
                  }
          
                  .suite-pill {
                      width: 48px;
                      height: 12px;
                      border-radius: 999px;
                      background: var(--a4f);
                      box-shadow: 0 0 14px rgba(239, 127, 63, 0.30);
                      flex-shrink: 0;
                  }
          
                  .arrow {
                      color: var(--a4f);
                      font-size: 1.2rem;
                      font-weight: 700;
                      transition: transform 0.22s ease;
                  }
          
                  .report-card:hover .arrow {
                      transform: translateX(4px);
                  }
          
                  .card-body {
                      margin-bottom: 20px;
                  }
          
                  .suite-name {
                      margin: 0;
                      color: var(--text);
                      font-size: 1rem;
                      font-weight: 700;
                  }
          
                  .card-foot {
                      display: flex;
                      align-items: center;
                      justify-content: flex-end;
                      margin-top: auto;
                  }
          
                  .open-link {
                      color: #8f6fff;
                      font-weight: 800;
                      font-size: 0.95rem;
                      letter-spacing: 0.02em;
                      transition: color 0.22s ease;
                  }
          
                  .report-card:hover .open-link {
                      color: #a88cff;
                  }
          
                  @media (max-width: 960px) {
                      .hero {
                          grid-template-columns: 1fr;
                      }
                  }
          
                  @media (max-width: 720px) {
                      .wrap {
                          padding: 20px 14px 32px;
                      }
          
                      .hero-main {
                          padding: 22px;
                      }
          
                      .hero-main h1 {
                          font-size: 1.55rem;
                      }
          
                      .brand {
                          flex-direction: column;
                          align-items: flex-start;
                      }
          
                      .main-logo {
                          height: 38px;
                      }
          
                      .secondary-logo {
                          height: 30px;
                      }
          
                      .hero-note {
                          text-align: left;
                      }
          
                      .meta-row {
                          flex-direction: column;
                      }
          
                      .meta-value {
                          text-align: left;
                      }
                  }
              </style>
          </head>
          
          <body>
              <div class="wrap">
                  <section class="hero">
                      <div class="hero-main">
                          <div class="brand">
                              <div class="brand-left">
                                  <img class="brand-logo main-logo" src="./assets/logo/glor.png" alt="Glor BE" />
                              </div>
                              <div class="brand-right">
                                  <img class="brand-logo secondary-logo" src="./assets/logo/A4F.png"
                                      alt="V&amp;V - Angel4Future" />
                              </div>
                          </div>
          
                          <div class="hero-tag">Project overview</div>
                          <h1>Backend Glor Reporting Dashboard</h1>
                          <p>
                              Hub centralizzato dei report Allure per il <strong>Backend Glor</strong>.
                          </p>
          
                          <div class="hero-schedule-wrap">
                              $nextRunsHtml
                          </div>
          
                          <div class="hero-note">Ref. V&amp;V - Angel4Future</div>
                      </div>
          
                      <div class="hero-side">
                          <h2 class="meta-card-title">Last run summary</h2>
          
                          <div class="meta-row">
                              <span class="meta-label">Branch</span>
                              <span class="meta-value">${{ github.ref_name }}</span>
                          </div>
          
                          <div class="meta-row">
                              <span class="meta-label">Run Number</span>
                              <span class="meta-value">${{ github.run_number }}</span>
                          </div>
          
                          <div class="meta-row">
                              <span class="meta-label">Run Type</span>
                              <span class="meta-value">$runType</span>
                          </div>
          
                          <div class="meta-row">
                              <span class="meta-label">Run Date</span>
                              <span class="meta-value">$runDate</span>
                          </div>
          
                          <div class="meta-row">
                              <span class="meta-label">Triggered Schedule</span>
                              <span class="meta-value">$triggeredScheduleLabel</span>
                          </div>
                      </div>
                  </section>
          
                  <div class="section-head">
                      <h2>Available Reports</h2>
                      <p>Seleziona una suite per aprire il relativo report.</p>
                  </div>
          
                  <section class="grid">
                      <a class="report-card" href="./validation/" aria-label="Apri report Validation">
                          <div class="card-head">
                              <span class="suite-pill"></span>
                              <span class="arrow">→</span>
                          </div>
                          <div class="card-body">
                              <p class="suite-name">Validazione</p>
                          </div>
                          <div class="card-foot">
                              <span class="open-link">Apri report</span>
                          </div>
                      </a>
          
                      <a class="report-card" href="./non-regression/" aria-label="Apri report Non Regression">
                          <div class="card-head">
                              <span class="suite-pill"></span>
                              <span class="arrow">→</span>
                          </div>
                          <div class="card-body">
                              <p class="suite-name">Non Regressione</p>
                          </div>
                          <div class="card-foot">
                              <span class="open-link">Apri report</span>
                          </div>
                      </a>
          
                      <a class="report-card" href="./integration/" aria-label="Apri report Integration">
                          <div class="card-head">
                              <span class="suite-pill"></span>
                              <span class="arrow">→</span>
                          </div>
                          <div class="card-body">
                              <p class="suite-name">Integrazione</p>
                          </div>
                          <div class="card-foot">
                              <span class="open-link">Apri report</span>
                          </div>
                      </a>
                  </section>
              </div>
          </body>
          
          </html>
          "@

          Set-Content -Path ".\pages-index.html" -Value $html -Encoding utf8

      - name: Deploy reports to GitHub Pages
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"

          $repo   = "${{ github.repository }}"
          $branch = "gh-pages"
          $remote = "https://x-access-token:$env:GH_TOKEN@github.com/$repo.git"

          $branchExists = git ls-remote --heads $remote $branch

          New-Item -ItemType Directory -Force -Path "gh-pages-deploy" | Out-Null
          Set-Location "gh-pages-deploy"

          git init
          git remote add origin $remote

          if ($branchExists) {
            git fetch origin $branch --depth=1
            git checkout -b $branch "origin/$branch"
            Get-ChildItem -Force | Where-Object { $_.Name -ne ".git" } | Remove-Item -Recurse -Force
          }
          else {
            git checkout --orphan $branch
          }

          if (Test-Path "..\allure-report-validation") {
            New-Item -ItemType Directory -Force -Path ".\validation" | Out-Null
            Get-ChildItem "..\allure-report-validation" -Force | Copy-Item -Destination ".\validation" -Recurse -Force
          }

          if (Test-Path "..\allure-report-non-regression") {
            New-Item -ItemType Directory -Force -Path ".\non-regression" | Out-Null
            Get-ChildItem "..\allure-report-non-regression" -Force | Copy-Item -Destination ".\non-regression" -Recurse -Force
          }

          if (Test-Path "..\allure-report-integration") {
            New-Item -ItemType Directory -Force -Path ".\integration" | Out-Null
            Get-ChildItem "..\allure-report-integration" -Force | Copy-Item -Destination ".\integration" -Recurse -Force
          }

          if (Test-Path "..\.github\workflows\assets\logo") {
            Write-Host "Cartella loghi trovata. Copia in corso..."
            New-Item -ItemType Directory -Force -Path ".\assets\logo" | Out-Null
            Copy-Item -Path "..\.github\workflows\assets\logo\*" -Destination ".\assets\logo" -Recurse -Force
            Write-Host "Loghi copiati:"
            Get-ChildItem ".\assets\logo" -File | ForEach-Object { Write-Host $_.Name }
          }
          else {
            Write-Host "Cartella ..\.github\workflows\assets\logo non trovata."
          }

          Copy-Item -Force "..\pages-index.html" ".\index.html"
          New-Item -ItemType File -Force -Path ".nojekyll" | Out-Null

          git add -A
          $changes = git status --porcelain

          if ($changes) {
            git commit -m "Publish Allure reports — Run ${{ github.run_number }} — ${{ github.event_name }}"
            git push $remote $branch --force
          }
          else {
            Write-Host "Nessuna modifica da pubblicare."
          }

      - name: Publish links in job summary
        shell: pwsh
        run: |
          $baseUrl = "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Allure Reports"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Home: $baseUrl"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Validation: $baseUrl/validation/"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Non Regression: $baseUrl/non-regression/"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Integration: $baseUrl/integration/"
