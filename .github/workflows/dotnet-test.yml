name: BE API Tests (NUnit) + Allure 3 Report (Persistent History JSONL)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "dev", "master" ]
  pull_request:
    branches: [ "main", "dev", "master" ]

permissions:
  actions: read
  contents: read

jobs:
  test-and-allure:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x" # cambia se usi net6/net7

      - name: Setup Node (Allure CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java (safe for Allure tooling)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Allure CLI (npm)
        run: |
          npm i -g allure
          allure --version
          allure generate --help

      - name: Locate solution or project
        id: locate
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $sln = Get-ChildItem -Path . -Recurse -File -Filter *.sln | Select-Object -First 1
          if ($sln) {
            "target=$($sln.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Using solution: $($sln.FullName)"
            exit 0
          }

          $csproj = Get-ChildItem -Path . -Recurse -File -Filter *.csproj | Select-Object -First 1
          if ($csproj) {
            "target=$($csproj.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Using project: $($csproj.FullName)"
            exit 0
          }

          throw "Nessun file .sln o .csproj trovato nel repository."

      - name: Restore
        run: dotnet restore "${{ steps.locate.outputs.target }}"

      - name: Build
        run: dotnet build "${{ steps.locate.outputs.target }}" --configuration Release --no-restore

      # Non blocca: vogliamo comunque report + artifacts anche quando i test falliscono
      - name: Test (TRX + Allure Results)
        continue-on-error: true
        run: >
          dotnet test "${{ steps.locate.outputs.target }}" --configuration Release --no-build
          --logger "trx;LogFileName=test_results.trx"
          --results-directory ./TestResults

      # Crea config CLI di Allure 3 per abilitare la history su file JSONL
      - name: Prepare Allure 3 CLI config (historyPath)
        shell: pwsh
        if: always()
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force -Path ".\.allure" | Out-Null

          $cfgPath = ".\allure-report.config.json"
          if (-not (Test-Path $cfgPath)) {
            @"
{
  "historyPath": "./.allure/history.jsonl"
}
"@ | Set-Content -Path $cfgPath -Encoding utf8

            Write-Host "Created $cfgPath"
          } else {
            Write-Host "Using existing $cfgPath"
          }

      # Scarica SEMPRE la run precedente (qualsiasi stato) ed eventualmente recupera history.jsonl
      - name: Download previous Allure history file (history.jsonl)
        shell: pwsh
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Continue"

          New-Item -ItemType Directory -Force -Path ".\.allure" | Out-Null

          $wf = "${{ github.workflow }}"
          $branch = "${{ github.ref_name }}"
          $currentRunId = [int]"${{ github.run_id }}"

          Write-Host "Finding previous run (any status) of workflow '$wf' on branch '$branch' (excluding current run_id=$currentRunId)..."

          $runs = gh run list --workflow "$wf" --branch "$branch" --limit 20 --json databaseId -q ".[] | .databaseId"
          if (-not $runs) {
            Write-Host "No runs found. Skipping history download."
            exit 0
          }

          $prevRunId = $null
          foreach ($id in $runs) {
            if ([int]$id -ne $currentRunId) { $prevRunId = $id; break }
          }

          if (-not $prevRunId) {
            Write-Host "No previous run found (only current run). Skipping history download."
            exit 0
          }

          Write-Host "Downloading artifact 'allure-history-file' from prevRunId=$prevRunId ..."
          New-Item -ItemType Directory -Force -Path ".\_prev" | Out-Null

          # Se l'artifact non esiste, non deve esplodere
          gh run download $prevRunId -n "allure-history-file" -D ".\_prev" 2>$null | Out-Null

          if (Test-Path ".\_prev\history.jsonl") {
            Copy-Item -Force ".\_prev\history.jsonl" ".\.allure\history.jsonl"
            Write-Host "Restored .\.allure\history.jsonl from previous run."
          } else {
            Write-Host "No history.jsonl found in previous artifact."
          }

      - name: Generate Allure Report (Allure 3 + historyPath)
        shell: pwsh
        if: always()
        run: |
          $ErrorActionPreference = "Stop"

          $resultsDirs = Get-ChildItem -Path . -Recurse -Directory -Filter "allure-results" |
                         Where-Object { (Get-ChildItem $_.FullName -File -ErrorAction SilentlyContinue | Measure-Object).Count -gt 0 } |
                         Select-Object -ExpandProperty FullName

          if (-not $resultsDirs -or $resultsDirs.Count -eq 0) {
            Write-Host "No allure-results with content found. Report will not be generated."
            exit 0
          }

          Write-Host "Allure results directories:"
          $resultsDirs | ForEach-Object { Write-Host " - $_" }

          if (Test-Path ".\allure-report") { Remove-Item -Recurse -Force ".\allure-report" }

          # ✅ Allure 3: la history viene gestita tramite historyPath nel file di config
          allure generate $resultsDirs --config ".\allure-report.config.json" -o ".\allure-report"

      # Assicura che history.jsonl esista sempre, così l'artifact non è mai "vuoto"
      - name: Ensure history.jsonl exists
        shell: pwsh
        if: always()
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path ".\.allure" | Out-Null
          $hist = ".\.allure\history.jsonl"
          if (-not (Test-Path $hist)) {
            # file vuoto va benissimo
            New-Item -ItemType File -Force -Path $hist | Out-Null
            Write-Host "Created empty $hist"
          } else {
            Write-Host "History file exists: $hist"
          }

      - name: Upload TRX results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testresults-trx
          path: ./TestResults/**/*.trx

      - name: Upload Allure Results (raw)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: |
            **/allure-results/**

      - name: Upload Allure Report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./allure-report/**

      # ✅ Questo è lo "stato" persistente tra run per Allure 3
      - name: Upload Allure history file (for next runs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-history-file
          path: ./.allure/history.jsonl
          if-no-files-found: warn
