name: BE API Tests (NUnit) + Allure Report (with Persistent History)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "dev", "master" ]
  pull_request:
    branches: [ "main", "dev", "master" ]

permissions:
  actions: read
  contents: read

jobs:
  test-and-allure:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node (Allure CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java (safe for Allure tooling)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Allure CLI (npm)
        run: |
          npm i -g allure
          allure --version

      - name: Locate solution or project
        id: locate
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $sln = Get-ChildItem -Path . -Recurse -File -Filter *.sln | Select-Object -First 1
          if ($sln) {
            "target=$($sln.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Using solution: $($sln.FullName)"
            exit 0
          }

          $csproj = Get-ChildItem -Path . -Recurse -File -Filter *.csproj | Select-Object -First 1
          if ($csproj) {
            "target=$($csproj.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Using project: $($csproj.FullName)"
            exit 0
          }

          throw "Nessun file .sln o .csproj trovato nel repository."

      - name: Restore
        run: dotnet restore "${{ steps.locate.outputs.target }}"

      - name: Build
        run: dotnet build "${{ steps.locate.outputs.target }}" --configuration Release --no-restore

      - name: Test (TRX + Allure Results)
        continue-on-error: true
        run: >
          dotnet test "${{ steps.locate.outputs.target }}" --configuration Release --no-build
          --logger "trx;LogFileName=test_results.trx"
          --results-directory ./TestResults

      - name: Download previous Allure history (artifact allure-history)
        shell: pwsh
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Continue"

          $wf = "${{ github.workflow }}"
          $branch = "${{ github.ref_name }}"

          Write-Host "Looking for last successful run of workflow '$wf' on branch '$branch'..."
          $runId = (gh run list --workflow "$wf" --branch "$branch" --status success --limit 1 --json databaseId -q ".[0].databaseId")

          if (-not $runId) {
            Write-Host "No previous successful run found. History will be skipped."
            exit 0
          }

          Write-Host "Downloading allure-history artifact from runId=$runId ..."
          New-Item -ItemType Directory -Force -Path ".\_prev" | Out-Null
          gh run download $runId -n "allure-history" -D ".\_prev" | Out-Null

          if (Test-Path ".\_prev\history") {
            Write-Host "Previous history folder found: .\_prev\history"
          } else {
            Write-Host "No history folder inside previous allure-history artifact. Skipping."
          }

      - name: Generate Allure Report (inject history)
        shell: pwsh
        if: always()
        run: |
          $ErrorActionPreference = "Stop"

          $resultsDirs = Get-ChildItem -Path . -Recurse -Directory -Filter "allure-results" |
                         Where-Object { (Get-ChildItem $_.FullName -File -ErrorAction SilentlyContinue | Measure-Object).Count -gt 0 } |
                         Select-Object -ExpandProperty FullName

          if (-not $resultsDirs -or $resultsDirs.Count -eq 0) {
            Write-Host "No allure-results with content found. Report will not be generated."
            exit 0
          }

          Write-Host "Allure results directories:"
          $resultsDirs | ForEach-Object { Write-Host " - $_" }

          $prevHistory = ".\_prev\history"
          if (Test-Path $prevHistory) {
            foreach ($dir in $resultsDirs) {
              $dest = Join-Path $dir "history"
              if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
              Copy-Item -Recurse -Force $prevHistory $dest
              Write-Host "Injected history into: $dest"
            }
          } else {
            Write-Host "No previous history to inject."
          }

          if (Test-Path ".\allure-report") { Remove-Item -Recurse -Force ".\allure-report" }
          allure generate $resultsDirs -o ".\allure-report"

      - name: Upload TRX results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testresults-trx
          path: ./TestResults/**/*.trx

      - name: Upload Allure Results (raw)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: |
            **/allure-results/**

      - name: Upload Allure Report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./allure-report/**

      - name: Upload Allure History (for next runs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-history
          path: ./allure-report/history/**
