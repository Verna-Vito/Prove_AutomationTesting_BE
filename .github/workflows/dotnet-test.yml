# ══════════════════════════════════════════════════════════════
# PIPELINE DI TEST BACKEND — GitHub Actions
# ══════════════════════════════════════════════════════════════
#
# Esegue nella stessa pipeline:
#   1) Validation tests     -> report /validation
#   2) Non regression tests -> report /non-regression
#
# History:
#   - separata per ciascun report
#   - recuperata da GitHub Pages
#
# Report:
#   - pubblicati su GitHub Pages in due sottopercorsi distinti
#
# Note:
#   - Validation: filtro Category=Validation Test
#   - Non regression: nessun filtro
#   - Inclusi step diagnostici per capire dove viene generata allure-results
# ══════════════════════════════════════════════════════════════

name: BE API Tests (NUnit) + Allure 3 Reports + GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  schedule:
    - cron: '20 23 * * *'
      timezone: 'Europe/Rome'

permissions:
  actions: read
  contents: write
  pages: write

jobs:
  test-and-allure:
    runs-on: windows-latest

    steps:
      # ── Checkout repository ─────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Setup toolchain ─────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node (Allure CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Allure CLI
        shell: pwsh
        run: |
          npm i -g allure
          allure --version

      # ── Individua .sln o .csproj ────────────────
      - name: Locate solution or project
        id: locate
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $sln = Get-ChildItem -Path . -Recurse -File -Filter *.sln | Select-Object -First 1
          if ($sln) {
            "target=$($sln.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Using solution: $($sln.FullName)"
            exit 0
          }

          $csproj = Get-ChildItem -Path . -Recurse -File -Filter *.csproj | Select-Object -First 1
          if ($csproj) {
            "target=$($csproj.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Using project: $($csproj.FullName)"
            exit 0
          }

          throw "Nessun file .sln o .csproj trovato nel repository."

      # ── Build ───────────────────────────────────
      - name: Restore
        shell: pwsh
        run: dotnet restore "${{ steps.locate.outputs.target }}"

      - name: Build
        shell: pwsh
        run: dotnet build "${{ steps.locate.outputs.target }}" --configuration Release --no-restore

      # ── Prepara cartelle di lavoro ──────────────
      - name: Prepare working folders
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force -Path ".\.allure\validation" | Out-Null
          New-Item -ItemType Directory -Force -Path ".\.allure\non-regression" | Out-Null
          New-Item -ItemType Directory -Force -Path ".\collected-results" | Out-Null

      # ── Config Allure Validation ────────────────
      - name: Prepare Allure config - Validation
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $reportName = "BE API Tests - Validation - ${{ github.ref_name }}"
          $cfgObj = @{
            name = $reportName
            historyPath = "./.allure/validation/history.jsonl"
          }

          $json = $cfgObj | ConvertTo-Json -Depth 10
          Set-Content -Path ".\allure-report-validation.config.json" -Value $json -Encoding utf8

      # ── Config Allure Non Regression ────────────
      - name: Prepare Allure config - Non Regression
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $reportName = "BE API Tests - Non Regression - ${{ github.ref_name }}"
          $cfgObj = @{
            name = $reportName
            historyPath = "./.allure/non-regression/history.jsonl"
          }

          $json = $cfgObj | ConvertTo-Json -Depth 10
          Set-Content -Path ".\allure-report-non-regression.config.json" -Value $json -Encoding utf8

      # ── Recupera history Validation ─────────────
      - name: Restore Validation history from GitHub Pages
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $ErrorActionPreference = "Continue"

          $url = "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/validation/.allure/history.jsonl"
          $dest = ".\.allure\validation\history.jsonl"

          Write-Host "Recupero Validation history da: $url"

          try {
            $resp = Invoke-WebRequest -Uri $url -OutFile $dest -PassThru -ErrorAction Stop
            Write-Host "HTTP status: $($resp.StatusCode)"
            Write-Host "✅ Validation history recuperata"
          }
          catch {
            Write-Host "⚠️ Nessuna Validation history trovata. Si parte da zero."
            New-Item -ItemType File -Force -Path $dest | Out-Null
          }

      # ── Recupera history Non Regression ─────────
      - name: Restore Non Regression history from GitHub Pages
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $ErrorActionPreference = "Continue"

          $url = "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/non-regression/.allure/history.jsonl"
          $dest = ".\.allure\non-regression\history.jsonl"

          Write-Host "Recupero Non Regression history da: $url"

          try {
            $resp = Invoke-WebRequest -Uri $url -OutFile $dest -PassThru -ErrorAction Stop
            Write-Host "HTTP status: $($resp.StatusCode)"
            Write-Host "✅ Non Regression history recuperata"
          }
          catch {
            Write-Host "⚠️ Nessuna Non Regression history trovata. Si parte da zero."
            New-Item -ItemType File -Force -Path $dest | Out-Null
          }

      # ── Pulizia eventuali risultati residui ─────
      - name: Cleanup old allure-results before Validation run
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Recurse -Directory -Filter "allure-results" -ErrorAction SilentlyContinue |
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

      # ── Test Validation ─────────────────────────
      - name: Run Validation tests
        shell: pwsh
        continue-on-error: true
        run: >
          dotnet test "${{ steps.locate.outputs.target }}" --configuration Release --no-build
          --filter "Category=Validation Test"
          --logger "trx;LogFileName=validation_results.trx"
          --results-directory ./TestResults/Validation

      # ── Diagnostica Validation ──────────────────
      - name: Diagnose Validation outputs
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          Write-Host "=== Cartelle allure-results trovate dopo Validation ==="
          Get-ChildItem -Path . -Recurse -Directory -Filter "allure-results" -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host $_.FullName }

          Write-Host "=== File TestResults ==="
          if (Test-Path ".\TestResults") {
            Get-ChildItem ".\TestResults" -Recurse -Force | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "Cartella TestResults non trovata"
          }

      # ── Cattura results Validation ──────────────
      - name: Capture Validation allure-results
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $ErrorActionPreference = "Stop"

          $dirs = Get-ChildItem -Path . -Recurse -Directory -Filter "allure-results" -ErrorAction SilentlyContinue |
                  Where-Object {
                    (Get-ChildItem $_.FullName -File -ErrorAction SilentlyContinue | Measure-Object).Count -gt 0
                  } |
                  Sort-Object LastWriteTime -Descending

          if (-not $dirs -or $dirs.Count -eq 0) {
            Write-Host "❌ Nessuna cartella allure-results con contenuto trovata dopo i test Validation."
            Write-Host "Verifica che l'adapter Allure NUnit sia configurato correttamente nel progetto."
            exit 1
          }

          $src = $dirs[0].FullName
          $dest = ".\collected-results\validation"

          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          Move-Item -Path $src -Destination $dest

          Write-Host "✅ Validation allure-results salvata in: $dest"

      # ── Pulizia eventuali risultati residui ─────
      - name: Cleanup old allure-results before Non Regression run
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          Get-ChildItem -Path . -Recurse -Directory -Filter "allure-results" -ErrorAction SilentlyContinue |
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

      # ── Test Non Regression ─────────────────────
      - name: Run Non Regression tests
        shell: pwsh
        continue-on-error: true
        run: >
          dotnet test "${{ steps.locate.outputs.target }}" --configuration Release --no-build
          --logger "trx;LogFileName=non_regression_results.trx"
          --results-directory ./TestResults/NonRegression

      # ── Diagnostica Non Regression ──────────────
      - name: Diagnose Non Regression outputs
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          Write-Host "=== Cartelle allure-results trovate dopo Non Regression ==="
          Get-ChildItem -Path . -Recurse -Directory -Filter "allure-results" -ErrorAction SilentlyContinue |
            ForEach-Object { Write-Host $_.FullName }

          Write-Host "=== File TestResults ==="
          if (Test-Path ".\TestResults") {
            Get-ChildItem ".\TestResults" -Recurse -Force | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "Cartella TestResults non trovata"
          }

      # ── Cattura results Non Regression ──────────
      - name: Capture Non Regression allure-results
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $ErrorActionPreference = "Stop"

          $dirs = Get-ChildItem -Path . -Recurse -Directory -Filter "allure-results" -ErrorAction SilentlyContinue |
                  Where-Object {
                    (Get-ChildItem $_.FullName -File -ErrorAction SilentlyContinue | Measure-Object).Count -gt 0
                  } |
                  Sort-Object LastWriteTime -Descending

          if (-not $dirs -or $dirs.Count -eq 0) {
            Write-Host "❌ Nessuna cartella allure-results con contenuto trovata dopo i test Non Regression."
            Write-Host "Verifica che l'adapter Allure NUnit sia configurato correttamente nel progetto."
            exit 1
          }

          $src = $dirs[0].FullName
          $dest = ".\collected-results\non-regression"

          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          Move-Item -Path $src -Destination $dest

          Write-Host "✅ Non Regression allure-results salvata in: $dest"

      # ── Genera report Validation ────────────────
      - name: Generate Validation Allure Report
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $ErrorActionPreference = "Stop"

          $resultsDir = ".\collected-results\validation"
          if (-not (Test-Path $resultsDir)) {
            throw "Cartella risultati Validation non trovata: $resultsDir"
          }

          if (Test-Path ".\allure-report-validation") {
            Remove-Item -Recurse -Force ".\allure-report-validation"
          }

          allure generate $resultsDir --config ".\allure-report-validation.config.json" -o ".\allure-report-validation"

      # ── Genera report Non Regression ────────────
      - name: Generate Non Regression Allure Report
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $ErrorActionPreference = "Stop"

          $resultsDir = ".\collected-results\non-regression"
          if (-not (Test-Path $resultsDir)) {
            throw "Cartella risultati Non Regression non trovata: $resultsDir"
          }

          if (Test-Path ".\allure-report-non-regression") {
            Remove-Item -Recurse -Force ".\allure-report-non-regression"
          }

          allure generate $resultsDir --config ".\allure-report-non-regression.config.json" -o ".\allure-report-non-regression"

      # ── Include history Validation nel report ───
      - name: Include Validation history in report
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          New-Item -ItemType Directory -Force -Path ".\allure-report-validation\.allure" | Out-Null
          Copy-Item -Force ".\.allure\validation\history.jsonl" ".\allure-report-validation\.allure\history.jsonl"

      # ── Include history Non Regression nel report
      - name: Include Non Regression history in report
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          New-Item -ItemType Directory -Force -Path ".\allure-report-non-regression\.allure" | Out-Null
          Copy-Item -Force ".\.allure\non-regression\history.jsonl" ".\allure-report-non-regression\.allure\history.jsonl"

      # ── Patch titolo tab Validation ─────────────
      - name: Patch Validation browser tab title
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $indexPath = ".\allure-report-validation\index.html"
          $browserTitle = "BE API Tests - Validation - ${{ github.ref_name }}"

          if (Test-Path $indexPath) {
            $content = Get-Content $indexPath -Raw
            $content = $content -replace '<title>Allure Report</title>', "<title>$browserTitle</title>"
            Set-Content -Path $indexPath -Value $content -Encoding utf8
          }

      # ── Patch titolo tab Non Regression ─────────
      - name: Patch Non Regression browser tab title
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $indexPath = ".\allure-report-non-regression\index.html"
          $browserTitle = "BE API Tests - Non Regression - ${{ github.ref_name }}"

          if (Test-Path $indexPath) {
            $content = Get-Content $indexPath -Raw
            $content = $content -replace '<title>Allure Report</title>', "<title>$browserTitle</title>"
            Set-Content -Path $indexPath -Value $content -Encoding utf8
          }

      # ── Crea homepage semplice ──────────────────
      - name: Create Pages landing page
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $html = @"
          <!DOCTYPE html>
          <html lang="it">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>BE API Test Reports</title>
            <style>
              body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 40px; }
              .wrap { max-width: 900px; margin: 0 auto; }
              h1 { margin-bottom: 8px; }
              p { color: #94a3b8; }
              .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 32px; }
              .card { background: #111827; border: 1px solid #334155; border-radius: 14px; padding: 24px; }
              a { display: inline-block; margin-top: 16px; color: #38bdf8; text-decoration: none; font-weight: bold; }
            </style>
          </head>
          <body>
            <div class="wrap">
              <h1>BE API Test Reports</h1>
              <p>Branch: ${{ github.ref_name }} | Run: ${{ github.run_number }}</p>
              <div class="grid">
                <div class="card">
                  <h2>Validation</h2>
                  <p>Report dei test filtrati con Category=Validation Test.</p>
                  <a href="./validation/">Apri report Validation</a>
                </div>
                <div class="card">
                  <h2>Non Regression</h2>
                  <p>Report completo senza filtro categoria.</p>
                  <a href="./non-regression/">Apri report Non Regression</a>
                </div>
              </div>
            </div>
          </body>
          </html>
          "@

          Set-Content -Path ".\pages-index.html" -Value $html -Encoding utf8

      # ── Deploy su GitHub Pages ──────────────────
      - name: Deploy reports to GitHub Pages
        if: ${{ !cancelled() }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"

          $repo   = "${{ github.repository }}"
          $branch = "gh-pages"
          $remote = "https://x-access-token:$env:GH_TOKEN@github.com/$repo.git"

          $branchExists = git ls-remote --heads $remote $branch

          New-Item -ItemType Directory -Force -Path "gh-pages-deploy" | Out-Null
          Set-Location "gh-pages-deploy"

          git init
          git remote add origin $remote

          if ($branchExists) {
            git fetch origin $branch --depth=1
            git checkout -b $branch "origin/$branch"
            Get-ChildItem -Force | Where-Object { $_.Name -ne ".git" } | Remove-Item -Recurse -Force
          }
          else {
            git checkout --orphan $branch
          }

          New-Item -ItemType Directory -Force -Path ".\validation" | Out-Null
          New-Item -ItemType Directory -Force -Path ".\non-regression" | Out-Null

          Get-ChildItem "..\allure-report-validation" -Force | Copy-Item -Destination ".\validation" -Recurse -Force
          Get-ChildItem "..\allure-report-non-regression" -Force | Copy-Item -Destination ".\non-regression" -Recurse -Force

          Copy-Item -Force "..\pages-index.html" ".\index.html"

          New-Item -ItemType File -Force -Path ".nojekyll" | Out-Null

          git add -A
          $changes = git status --porcelain

          if ($changes) {
            git commit -m "Publish Allure reports — Run ${{ github.run_number }} — ${{ github.event_name }}"
            git push $remote $branch --force
          }
          else {
            Write-Host "Nessuna modifica da pubblicare."
          }

      # ── Summary finale ──────────────────────────
      - name: Publish links in job summary
        shell: pwsh
        if: ${{ !cancelled() }}
        run: |
          $baseUrl = "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          $validationUrl = "$baseUrl/validation/"
          $nonRegressionUrl = "$baseUrl/non-regression/"

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Allure Reports"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Validation: $validationUrl"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Non Regression: $nonRegressionUrl"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Branch: ${{ github.ref_name }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Run number: ${{ github.run_number }}"
